context:
  version: "0.2.0"
  python_min: '3.12'

package:
  name: jablonski
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jablonski/jablonski-${{ version }}.tar.gz
  sha256: 6fa003aaf8681bf0aa105ec3699f95f2ed5e9fad928d9b21460deb8812fac20c

build:
  noarch: python
  script: python -m pip install . -vv
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - uv-build
    - pip
  run:
    - python >=${{ python_min }}
    - poincare >=1.1.1

tests:
  - python:
      imports:
        - poincare
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://dyscolab.github.io
  documentation: https://dyscolab.github.io/jablonski
  repository: https://github.com/dyscolab/jablonski
  license: BSD-3-Clause
  license_file: LICENSE
  summary: 'Simulation of dynamical systems.'

extra:
  recipe-maintainers:
    - maurosilber
    - olistarosta
